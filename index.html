<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY | AR Debug Test</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    
    #start-btn { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 20px 40px; background: white; border: none; font-weight: bold;
      z-index: 100; cursor: pointer; text-transform: uppercase;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <button id="start-btn">Start Test</button>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, alpha: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-box 
        position="0 0 0.2" 
        scale="0.3 0.3 0.3" 
        material="color: red; opacity: 0.9;">
      </a-box>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      startBtn.classList.add('hidden');
      sceneEl.systems["mindar-image-system"].start();
    });

    // Logging to verify if the mural is detected
    sceneEl.addEventListener("targetFound", () => {
      console.log("SUCCESS: Mural detected!");
    });

    sceneEl.addEventListener("targetLost", () => {
      console.log("Mural lost from view.");
    });
  </script>
</body>
</html>
