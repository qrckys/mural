<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY 2 Experience</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #000; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 100; text-align: center;
    }

    #start-btn { 
      padding: 18px 40px; font-size: 1rem; background: #fff; color: #000; 
      border: none; border-radius: 5px; cursor: pointer; font-weight: bold; 
      text-transform: uppercase; letter-spacing: 2px;
    }

    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 25px; border-radius: 8px; }

    #ui-buttons {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 15px; z-index: 50; width: 90%; justify-content: center;
      display: none; 
    }

    .action-btn {
      flex: 1; max-width: 160px; padding: 14px 10px; background: rgba(0, 0, 0, 0.8);
      color: white; border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 8px;
      text-decoration: none; text-align: center; font-size: 0.85rem;
      font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="letter-spacing: 8px; font-weight: 200; margin-bottom: 10px;">EBONY</h1>
    <img src="ebony.jpg" id="marker-preview">
    <button id="start-btn">Enter Experience</button>
  </div>

  <div id="ui-buttons">
    <a href="https://www.instagram.com/qrcky/" target="_blank" class="action-btn">Instagram</a>
    <a href="https://www.qrcky.net/prints/" target="_blank" class="action-btn" style="background: #fff; color: #000;">Buy Prints</a>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="ebony-model" src="ebony.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model 
        src="#ebony-model" 
        position="0 0 0.1" 
        scale="0.05 0.05 0.05"
        rotation="90 0 0"
        animation-mixer>
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const uiButtons = document.getElementById('ui-buttons');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      document.body.style.backgroundColor = "transparent";
      sceneEl.systems["mindar-image-system"].start();
    });

    sceneEl.addEventListener("arReady", () => {
      overlay.style.display = "none";
      uiButtons.style.display = "flex";
    });
  </script>
</body>
</html>
