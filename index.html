<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY AR</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      overflow: hidden; 
    }

    body.loading-bg { background: #000 !important; }
    body.ar-active { background: transparent !important; }
    
    a-scene { background: transparent !important; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999; font-family: sans-serif;
      text-align: center;
    }
    
    #start-btn { 
      padding: 18px 40px; font-size: 18px; 
      background: #28a745; color: #fff; 
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold; 
      text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    #start-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 25px; }

    /* Updated scan hint to Black */
    #scan-hint {
      position: fixed; top: 30px; width: 100%; text-align: center;
      color: #000; /* Black text */
      font-family: sans-serif; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 1000; display: none; opacity: 1; 
      font-weight: bold;
    }

    #ui-controls {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%); display: none; 
      gap: 15px; z-index: 1000; width: 90%; justify-content: center;
    }

    .black-btn {
      padding: 15px 25px; background: #000; color: #fff;
      text-decoration: none; border: 1px solid #444; border-radius: 4px;
      font-family: sans-serif; font-weight: bold; font-size: 13px;
      text-transform: uppercase; letter-spacing: 1px; text-align: center;
      min-width: 120px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }
    .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
  </style>
</head>
<body class="loading-bg">

  <div id="scan-hint">Point camera at artwork</div>

  <div id="overlay">
    <h1 style="letter-spacing: 3px; font-weight: 300; margin-bottom: 5px;">EBONY</h1>
    <p style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; margin-bottom: 25px; opacity: 0.8;">by Qrcky</p>

    <div id="status-container">
        <img src="https://qrckys.github.io/mural/enslaved.jpg" id="marker-preview">
        <br>
        <button id="start-btn">Enter Experience</button>
    </div>
  </div>

  <div id="ui-controls">
    <a href="https://www.instagram.com/qrcky/" target="_blank" class="black-btn">Instagram</a>
    <a href="https://www.qrcky.net/prints/" target="_blank" class="black-btn">Get Prints</a>
  </div>

<a-scene 
  mindar-image="imageTargetSrc: https://qrckys.github.io/mural/targets.mind; autoStart: false; uiScanning: false; uiLoading: false; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.0005;" 
  color-space="sRGB" 
  renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sculpture" src="https://qrckys.github.io/mural/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-light type="ambient" intensity="1.0"></a-light>

    <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
      <a-gltf-model 
        src="#sculpture" 
        position="0.0 -0.525 0.0" 
        scale="0.048 0.048 0.048"
        rotation="0 0 0"
        animation-mixer="clip: *; loop: repeat">
      </a-gltf-model>
    </a-entity>
</a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const uiControls = document.getElementById('ui-controls');
    const scanHint = document.getElementById('scan-hint');
    const sceneEl = document.querySelector('a-scene');
    const targetEntity = document.getElementById('target-entity');

    startBtn.addEventListener('click', () => {
      startBtn.disabled = true;
      startBtn.innerText = "INITIALIZING...";
      
      const mindAR = sceneEl.systems["mindar-image-system"];
      if (mindAR) {
        mindAR.start();
      } else {
        sceneEl.addEventListener("loaded", () => {
          sceneEl.systems["mindar-image-system"].start();
        }, { once: true });
      }
    });

    sceneEl.addEventListener("arReady", () => {
      document.body.classList.remove('loading-bg');
      document.body.classList.add('ar-active');
      overlay.style.display = "none";
      scanHint.style.display = "block";
    });

    targetEntity.addEventListener("targetFound", () => {
      uiControls.style.display = "flex";
      scanHint.style.display = "none";
    });

    targetEntity.addEventListener("targetLost", () => {
      scanHint.style.display = "block";
    });

    document.addEventListener("visibilitychange", () => {
      const mindAR = sceneEl.systems["mindar-image-system"];
      if (!mindAR) return;
      if (document.hidden) {
        mindAR.pause();
      } else {
        mindAR.start();
      }
    });

    sceneEl.addEventListener("arError", () => {
      startBtn.disabled = false;
      startBtn.innerText = "RETRY EXPERIENCE";
    });
  </script>
</body>
</html>
