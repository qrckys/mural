<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY | WebAR Experience</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    :root {
      --accent: #ffffff;
      --glass: rgba(0, 0, 0, 0.8);
      --progress-bg: rgba(255, 255, 255, 0.1);
    }

    body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #000; }

    /* Landing Screen Overlay */
    #overlay {
      position: fixed; inset: 0;
      background: #000; color: #fff;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 2000; text-align: center; transition: opacity 0.5s ease;
    }

    /* Loading UI */
    #loading-container { width: 220px; margin-top: 30px; }
    
    #loading-bar {
      width: 100%; height: 2px; background: var(--progress-bg);
      border-radius: 2px; overflow: hidden; position: relative;
    }

    #loading-fill {
      position: absolute; top: 0; left: 0; height: 100%;
      width: 0%; background: var(--accent);
      transition: width 0.3s ease;
    }

    #loading-text {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px;
      margin-top: 12px; opacity: 0.5;
    }

    #start-btn { 
      display: none; 
      padding: 18px 50px; font-size: 1rem; background: var(--accent); color: #000; 
      border: none; border-radius: 4px; cursor: pointer; font-weight: 800; 
      text-transform: uppercase; letter-spacing: 4px; margin-top: 20px;
    }

    /* UI Navigation */
    #ar-ui {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 40px 20px; display: none; flex-direction: column;
      align-items: center; z-index: 1000; pointer-events: none;
    }

    .btn-container { display: flex; gap: 12px; width: 100%; max-width: 400px; pointer-events: auto; }

    .action-btn {
      flex: 1; padding: 16px 10px; background: var(--glass); color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px;
      text-decoration: none; text-align: center; font-size: 0.8rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    .action-btn.primary { background: #fff; color: #000; border: none; }

    #scan-guide {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60vw; height: 60vw; max-width: 280px; border: 1px dashed rgba(255,255,255,0.3);
      border-radius: 10px; display: none; pointer-events: none; z-index: 500;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="letter-spacing: 15px; font-weight: 200; margin: 0; margin-left: 15px;">EBONY</h1>
    <div style="width: 30px; height: 1px; background: #444; margin: 25px 0;"></div>
    
    <div id="loading-container">
      <div id="loading-bar"><div id="loading-fill"></div></div>
      <div id="loading-text">Synchronizing Assets</div>
    </div>

    <button id="start-btn">Start Experience</button>
  </div>

  <div id="ar-ui">
    <div class="btn-container">
      <a href="https://www.instagram.com/qrcky/" target="_blank" class="action-btn">Instagram</a>
      <a href="https://www.qrcky.net/prints/" target="_blank" class="action-btn primary">Shop Prints</a>
    </div>
  </div>

  <div id="scan-guide"></div>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true, antialias: true, logarithmicDepthBuffer: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="ebony-model" src="ebony.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model 
        src="#ebony-model" 
        position="0 0 0.1" 
        scale="0.2 0.2 0.2" 
        rotation="90 0 0" 
        animation-mixer>
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const loadingContainer = document.getElementById('loading-container');
    const loadingFill = document.getElementById('loading-fill');
    const overlay = document.getElementById('overlay');
    const arUi = document.getElementById('ar-ui');
    const scanGuide = document.getElementById('scan-guide');
    const sceneEl = document.querySelector('a-scene');

    // Asset Tracking
    THREE.DefaultLoadingManager.onProgress = function (url, itemsLoaded, itemsTotal) {
      const progress = (itemsLoaded / itemsTotal) * 100;
      loadingFill.style.width = progress + '%';
    };

    THREE.DefaultLoadingManager.onLoad = function () {
      loadingContainer.style.display = 'none';
      startBtn.style.display = 'block';
    };

    startBtn.addEventListener('click', () => {
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.classList.add('hidden');
        arUi.style.display = 'flex';
        scanGuide.style.display = 'block';
        sceneEl.systems["mindar-image-system"].start();
      }, 500);
    });

    sceneEl.addEventListener("targetFound", () => scanGuide.classList.add('hidden'));
    sceneEl.addEventListener("targetLost", () => scanGuide.classList.remove('hidden'));
  </script>
</body>
</html>
