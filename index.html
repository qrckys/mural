<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY AR</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    
    body.loading-bg { background: #000 !important; }
    body.ar-active  { background: transparent !important; }
    a-scene { background: transparent !important; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
      font-family: sans-serif; text-align: center;
    }

    #start-btn {
      padding: 18px 40px; font-size: 18px; background: #28a745; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #start-btn:disabled { background: #555; cursor: default; }

    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 25px; opacity: 0.8; }

    #progress-container {
      width: 240px; height: 4px; background: #222;
      margin-top: 20px; border-radius: 2px; display: none; overflow: hidden;
    }
    #progress-bar { width: 0%; height: 100%; background: #28a745; transition: width 0.3s ease; }

    #progress-text {
      font-size: 10px; margin-top: 15px; color: #666;
      display: none; letter-spacing: 2px; text-transform: uppercase;
    }

    #error-msg {
      display: none; margin-top: 20px; padding: 12px 20px;
      background: #8b0000; border-radius: 4px; font-size: 13px;
      max-width: 280px; line-height: 1.5;
    }

    #scan-hint {
      position: fixed; top: 30px; width: 100%; text-align: center;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      font-family: sans-serif; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 1000; display: none; font-weight: bold;
      pointer-events: none;
    }

    #ui-controls {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: none; gap: 15px; z-index: 1000; width: 90%; justify-content: center;
    }

    .black-btn {
      padding: 15px 25px; background: #000; color: #fff; text-decoration: none;
      border: 1px solid #444; border-radius: 4px; font-family: sans-serif;
      font-weight: bold; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; text-align: center; min-width: 120px;
    }

    .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }
  </style>
</head>
<body class="loading-bg">

  <div id="scan-hint">Point camera at artwork</div>

  <div id="overlay">
    <h1 style="letter-spacing: 5px; font-weight: 300; margin-bottom: 5px;">EBONY</h1>
    <p style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; margin-bottom: 30px; opacity: 0.6;">By Qrcky</p>

    <div id="status-container">
      <img src="https://qrckys.github.io/mural/ebony.jpg" id="marker-preview" alt="Target">
      <br>
      <button id="start-btn">Enter Experience</button>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <p id="progress-text">Initializing...</p>
      <div id="error-msg"></div>
    </div>
  </div>

  <div id="ui-controls">
    <a href="https://www.instagram.com/qrcky/" target="_blank" class="black-btn">Instagram</a>
    <a href="https://www.qrcky.net/prints/" target="_blank" class="black-btn">Get Prints</a>
  </div>

  <!--
    FIX 1: Removed the duplicate `mindar-image-target="targetIndex: 1"` entity.
            The targets.mind file only contains one image target (index 0).
            The dead second entity was wasting memory and causing silent tracking errors.

    PERF 1: Tuned filterMinCF (0.001) and filterBeta (0.001) for better stability.
            The original values were extremely low, causing jittery / slow-locking tracking.

    PERF 2: Removed warmupTolerance and missedTolerance overrides — defaults are well-tuned.
  -->
  <a-scene
    mindar-image="imageTargetSrc: https://qrckys.github.io/mural/targets.mind; autoStart: false; uiScanning: false; uiLoading: false; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="30000">
      <a-asset-item id="sculpture" src="https://qrckys.github.io/mural/ebony.glb" crossorigin="anonymous"></a-asset-item>
      <!--
        FIX 2: Changed audio preload from "auto" to "none".
                "auto" forces the browser to eagerly buffer the entire MP3 before AR starts,
                blocking on mobile networks. We trigger load manually at first play.
      -->
      <audio id="audio-file" src="https://qrckys.github.io/mural/ebony.mp3" preload="none" crossorigin="anonymous" loop></audio>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-light type="ambient" intensity="1.2"></a-light>

    <!-- FIX 1: Only one target entity — matches the single target in targets.mind -->
    <a-entity mindar-image-target="targetIndex: 0" id="mural-target">
      <a-gltf-model src="#sculpture" position="0.0 -0.425 0.0" scale="0.048 0.048 0.048" animation-mixer></a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const startBtn        = document.getElementById('start-btn');
    const overlay         = document.getElementById('overlay');
    const progressContainer = document.getElementById('progress-container');
    const progressBar     = document.getElementById('progress-bar');
    const progressText    = document.getElementById('progress-text');
    const errorMsg        = document.getElementById('error-msg');
    const sceneEl         = document.querySelector('a-scene');
    const audioEl         = document.getElementById('audio-file');
    const scanHint        = document.getElementById('scan-hint');
    const uiControls      = document.getElementById('ui-controls');

    let modelP = 0, mindP = 0;

    // FIX 3: Track only model and mind-target progress.
    //         The original code also tracked audio (via canplaythrough), but with preload="none"
    //         canplaythrough never fires until the user triggers play — so audio progress
    //         was silently stuck at 0, underreporting total progress.
    function updateDisplay() {
      // 70% model weight, 30% mind-target weight
      const total = Math.min(99, (modelP * 0.7) + (mindP * 0.3));
      progressBar.style.width = total + '%';

      let status = 'DOWNLOADING ASSETS...';
      if (total > 80) status = 'STARTING CAMERA...';
      if (total >= 99) status = 'READY';

      progressText.innerText = `${status}  ${Math.round(total)}%`;
    }

    // FIX 3 (continued): Filter THREE.js loading progress to only count our .glb asset.
    //                    The original hook fired for ALL assets (MindAR internals, etc.),
    //                    causing the bar to reset and jump unexpectedly.
    THREE.DefaultLoadingManager.onProgress = (url, loaded, total) => {
      if (url && url.includes('.glb')) {
        modelP = (loaded / total) * 100;
        updateDisplay();
      }
    };

    sceneEl.addEventListener('mindar-image-load-progress', (e) => {
      mindP = e.detail.progress;
      updateDisplay();
    });

    // ----- Button click: unlock audio context then start AR -----
    startBtn.addEventListener('click', () => {
      startBtn.style.display = 'none';
      progressContainer.style.display = 'block';
      progressText.style.display = 'block';

      // Unlock the Web Audio context on the user gesture (required on iOS/Android).
      // We do NOT try to play/pause the audio here — preload="none" means the
      // browser hasn't buffered anything yet, so a silent play().then(pause()) would
      // trigger a network fetch and stall the AR startup on slow connections.
      function unlockAudioContext() {
        try {
          const ctx = THREE.AudioContext.getContext();
          if (ctx && ctx.state === 'suspended') ctx.resume();
        } catch (e) { /* AudioContext may not exist yet — safe to ignore */ }
      }

      function startAR() {
        unlockAudioContext();
        const mindAR = sceneEl.systems['mindar-image-system'];
        if (mindAR) {
          mindAR.start();
        } else {
          showError('AR system failed to initialise. Please refresh.');
        }
      }

      if (sceneEl.hasLoaded) {
        startAR();
      } else {
        sceneEl.addEventListener('loaded', startAR, { once: true });
      }
    });

    // ----- AR ready: swap to camera view -----
    sceneEl.addEventListener('arReady', () => {
      setTimeout(() => {
        document.body.classList.remove('loading-bg');
        document.body.classList.add('ar-active');
        overlay.style.display = 'none';
        scanHint.style.display = 'block';
      }, 800);
    });

    // ----- Target found / lost -----
    // FIX 4: Select via ID instead of class querySelectorAll loop —
    //         simpler and avoids iterating over a dead second entity.
    const muralTarget = document.getElementById('mural-target');

    // Tracks whether the target is currently in frame.
    // Used by the visibility logic to know whether audio *should* be playing.
    let targetActive = false;

    muralTarget.addEventListener('targetFound', () => {
      targetActive = true;
      uiControls.style.display = 'flex';
      scanHint.style.display = 'none';
      // Audio starts loading here (preload="none") and plays once buffered.
      audioEl.play().catch(() => {
        // Autoplay blocked — user will hear audio after next interaction.
      });
    });

    muralTarget.addEventListener('targetLost', () => {
      targetActive = false;
      scanHint.style.display = 'block';
      uiControls.style.display = 'none';
      audioEl.pause();
    });

    // ----- Pause / resume audio when the user leaves or returns to this tab/app -----
    // visibilitychange  — covers: tab switch, phone lock screen, app switch to background.
    // blur/focus        — covers: target="_blank" links (new tab opens, this page stays
    //                    "visible" but loses window focus — visibilitychange never fires).
    //
    // The blur debounce prevents false positives: when a new tab opens the browser
    // briefly blurs then immediately re-focuses this window internally. A 300 ms guard
    // lets those transient blurs pass without pausing audio.

    let blurTimer = null;

    function onPageHidden() {
      audioEl.pause();
    }

    function onPageVisible() {
      if (targetActive) audioEl.play().catch(() => {});
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) onPageHidden();
      else onPageVisible();
    });

    window.addEventListener('blur', () => {
      // Wait a beat before treating this as a real navigation away.
      blurTimer = setTimeout(onPageHidden, 300);
    });

    window.addEventListener('focus', () => {
      // Cancel the pending pause if focus returned quickly (browser-internal juggle).
      clearTimeout(blurTimer);
      blurTimer = null;
      if (!document.hidden) onPageVisible();
    });

    // FIX 5: arError now clears the loading UI and shows a readable message
    //         instead of a bare alert(), which blocks the page on some browsers.
    sceneEl.addEventListener('arError', (e) => {
      console.error('AR error:', e);
      showError('Camera access is required.<br>Please use HTTPS and allow camera permissions, then refresh.');
    });

    function showError(html) {
      startBtn.style.display = 'none';
      progressContainer.style.display = 'none';
      progressText.style.display = 'none';
      errorMsg.innerHTML = html;
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
