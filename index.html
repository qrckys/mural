<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY AR</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body.loading-bg { background: #000 !important; }
    body.ar-active { background: transparent !important; }
    a-scene { background: transparent !important; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999; font-family: sans-serif;
      text-align: center;
    }
    
    #start-btn { 
      padding: 18px 40px; font-size: 18px; background: #28a745; color: #fff; 
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold; 
      text-transform: uppercase; letter-spacing: 1px;
    }
    #start-btn:focus-visible {
      outline: 3px solid #28a745; outline-offset: 4px;
    }

    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 25px; }

    #progress-container {
      width: 200px; height: 4px; background: #333;
      margin-top: 20px; border-radius: 2px; display: none; overflow: hidden;
    }

    #progress-bar { width: 0%; height: 100%; background: #28a745; transition: width 0.3s ease; }

    #error-msg {
      display: none; color: #ff5555; font-size: 13px; margin-top: 20px;
      max-width: 280px; line-height: 1.5; letter-spacing: 0.5px;
    }

    #scan-hint {
      position: fixed; top: 30px; width: 100%; text-align: center;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      font-family: sans-serif; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 1000; display: none; font-weight: bold;
    }

    #ui-controls {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
      display: none; gap: 15px; z-index: 1000; width: 90%; justify-content: center;
    }

    .black-btn {
      padding: 15px 25px; background: #000; color: #fff; text-decoration: none; 
      border: 1px solid #444; border-radius: 4px; font-family: sans-serif; 
      font-weight: bold; font-size: 13px; text-transform: uppercase; 
      letter-spacing: 1px; text-align: center; min-width: 120px;
    }

    .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }
    .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
  </style>
</head>
<body class="loading-bg">

  <div id="scan-hint">Point camera at artwork</div>

  <div id="overlay">
    <h1 style="letter-spacing: 3px; font-weight: 300; margin-bottom: 5px;">EBONY</h1>
    <p style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; margin-bottom: 25px; opacity: 0.8;">by Qrcky</p>
    
    <div id="status-container">
        <img src="https://qrckys.github.io/mural/ebony.jpg" id="marker-preview" alt="Target artwork to scan">
        <br>
        <button id="start-btn" aria-label="Enter the AR experience">Enter Experience</button>
        
        <div id="progress-container">
          <div id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <p id="progress-text" style="font-size: 10px; margin-top: 10px; color: #888; display: none; letter-spacing: 1px;">INITIALIZING...</p>

        <p id="error-msg"></p>
    </div>
  </div>

  <div id="ui-controls">
    <a href="https://www.instagram.com/qrcky/" target="_blank" class="black-btn">Instagram</a>
    <a href="https://www.qrcky.net/prints/" target="_blank" class="black-btn">Get Prints</a>
  </div>

<a-scene 
  mindar-image="imageTargetSrc: https://qrckys.github.io/mural/targets.mind; autoStart: false; uiScanning: false; uiLoading: false; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.0005;"
  color-space="sRGB" 
  renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true" 
  vr-mode-ui="enabled: false" 
  device-orientation-permission-ui="enabled: false">
    
  <a-assets timeout="30000">
    <a-asset-item id="sculpture" src="https://qrckys.github.io/mural/ebony.glb"></a-asset-item>
    <audio id="audio-file" src="https://qrckys.github.io/mural/ebony.mp3" preload="none" crossorigin="anonymous" loop playsinline webkit-playsinline></audio>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-light type="ambient" intensity="1.0"></a-light>

  <a-entity mindar-image-target="targetIndex: 0" class="mural-target">
    <a-gltf-model src="#sculpture" position="0.0 -0.425 0.0" scale="0.048 0.048 0.048" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
  </a-entity>

  <a-entity mindar-image-target="targetIndex: 1" class="mural-target">
    <a-gltf-model src="#sculpture" position="0.0 -0.425 0.0" scale="0.048 0.048 0.048" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
  </a-entity>

</a-scene>

<script>
  const startBtn          = document.getElementById('start-btn');
  const overlay           = document.getElementById('overlay');
  const progressContainer = document.getElementById('progress-container');
  const progressBar       = document.getElementById('progress-bar');
  const progressText      = document.getElementById('progress-text');
  const errorMsg          = document.getElementById('error-msg');
  const sceneEl           = document.querySelector('a-scene');
  const audioEl           = document.getElementById('audio-file');

  let arStarted = false; 

  function dismissOverlay() {
    if (arStarted) return;
    arStarted = true;
    console.log("Dismissing overlay");
    document.body.classList.remove('loading-bg');
    document.body.classList.add('ar-active');
    overlay.style.display = "none";
    document.getElementById('scan-hint').style.display = "block";
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    progressContainer.style.display = 'none';
    progressText.style.display = 'none';
    startBtn.style.display = 'block'; 
  }

  startBtn.addEventListener('click', () => {
    startBtn.style.display = "none";
    progressContainer.style.display = "block";
    progressText.style.display = "block";
    progressBar.style.width = "5%";
    progressBar.setAttribute('aria-valuenow', 5);

    const unlockAudio = () => {
      try {
        const audioCtx = THREE.AudioContext.getContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {
        console.log("AudioContext note:", e);
      }
      // Warm up the audio so it's ready for later
      audioEl.play().then(() => {
        audioEl.pause();
      }).catch(e => console.log("Audio unlock note:", e));
    };

    const startAR = () => {
      unlockAudio();
      const mindAR = sceneEl.systems["mindar-image-system"];
      if (mindAR) {
        mindAR.start();
        setTimeout(() => {
          if (!arStarted) dismissOverlay();
        }, 12000);
      } else {
        showError("Could not start AR. Please refresh and try again.");
      }
    };

    if (sceneEl.hasLoaded) {
      startAR();
    } else {
      sceneEl.addEventListener("loaded", startAR, { once: true });
    }
  });

  sceneEl.addEventListener("mindar-image-load-progress", (event) => {
    const progress = event.detail.progress;
    progressBar.style.width = progress + "%";
    progressBar.setAttribute('aria-valuenow', Math.round(progress));
    progressText.innerText = "LOADING DATA: " + Math.round(progress) + "%";
  });

  sceneEl.addEventListener("arReady", () => {
    dismissOverlay();
  });

  // Target found / lost logic
  document.querySelectorAll('.mural-target').forEach((target) => {
    target.addEventListener("targetFound", () => {
      document.getElementById('ui-controls').style.display = "flex";
      document.getElementById('scan-hint').style.display = "none";
      
      // Removed currentTime = 0 to prevent restarting the audio
      audioEl.play().catch(e => console.log("Playback error:", e));
    });

    target.addEventListener("targetLost", () => {
      document.getElementById('scan-hint').style.display = "block";
      audioEl.pause();
    });
  });

  sceneEl.addEventListener("arError", (event) => {
    overlay.style.display = "flex";
    showError("Camera error. Please ensure you are on HTTPS and have granted camera permissions.");
  });
</script>
</body>
</html>
