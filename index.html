<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene with VR Enabled</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene vr-mode-ui="enabled: true" device-orientation-permission-ui="enabled: true">
        
        <a-sky color="#ECECEC"></a-sky>

        <a-assets>
            <a-asset-item id="myModel" src="model.glb"></a-asset-item>
        </a-assets>

        <a-entity gltf-model="#myModel" 
                  position="0 1 -3" 
                  scale="1 1 1"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>

        <a-light type="ambient" color="#BBB"></a-light>
        <a-light type="directional" color="#FFF" intensity="0.6" position="-1 1 1"></a-light>

    </a-scene>

</body>
</html>
