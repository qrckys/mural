<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EBONY | AR Hard-Fix</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; background: rgba(0,0,0,0.8);
        }

        #log {
            position: fixed; top: 10px; left: 10px; width: 90%; height: 150px;
            background: #222; color: #0f0; padding: 10px; font-size: 12px;
            overflow-y: auto; z-index: 1000; border: 1px solid #444;
        }

        #big-button {
            padding: 30px 60px; font-size: 20px; font-weight: bold;
            background: #fff; color: #000; border: none; border-radius: 10px;
            cursor: pointer; text-transform: uppercase;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="log">SYSTEM LOG:<br>> Page Loaded. Waiting for Tap...</div>

    <div id="ui-layer">
        <button id="big-button">ACTIVATE CAMERA</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, alpha: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="ebony-model" src="ebony.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-box position="0 0 0.1" scale="0.2 0.2 0.2" color="red"></a-box>
            
            <a-gltf-model 
                src="#ebony-model" 
                position="0 0 0.2" 
                scale="0.01 0.01 0.01" 
                rotation="90 0 0">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const logWindow = document.getElementById('log');
        const uiLayer = document.getElementById('ui-layer');
        const btn = document.getElementById('big-button');
        const sceneEl = document.querySelector('a-scene');

        function print(msg) {
            logWindow.innerHTML += `<br>> ${msg}`;
            console.log(msg);
        }

        // Catch global errors (like 404s or script crashes)
        window.onerror = function(msg, url, line) {
            print(`CRITICAL ERROR: ${msg} at line ${line}`);
        };

        btn.addEventListener('click', () => {
            print("Button Tapped. Checking Protocol...");
            
            // 1. Check if running on HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                print("ABORT: Camera requires HTTPS. Your site is not secure.");
                return;
            }

            uiLayer.classList.add('hidden');
            print("Requesting Camera Permissions...");

            // 2. Start MindAR
            try {
                sceneEl.systems["mindar-image-system"].start();
                print("MindAR System started. If screen is black, check browser permissions.");
            } catch (e) {
                print("START FAILED: " + e.message);
            }
        });

        // Event Listeners for AR State
        sceneEl.addEventListener("arReady", () => print("AR Engine Ready. Point at mural now."));
        sceneEl.addEventListener("targetFound", () => print("SUCCESS: Mural Found!"));
        sceneEl.addEventListener("targetLost", () => print("Target Lost. Re-scan mural."));

        // File checks
        document.querySelector('#ebony-model').addEventListener('model-error', () => {
            print("ERROR: Could not load ebony.glb. Check file name/path.");
        });
    </script>
</body>
</html>
