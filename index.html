<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>EBONY AR</title>

  <!-- Preload heavy assets early so browser fetches them in parallel -->
  <link rel="preload" href="https://qrckys.github.io/mural/ebony.glb" as="fetch" crossorigin="anonymous">
  <link rel="preload" href="https://qrckys.github.io/mural/ebony.mp3" as="fetch" crossorigin="anonymous">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

    body.loading-bg { background: #000 !important; }
    body.ar-active  { background: transparent !important; }
    a-scene { background: transparent !important; }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
      font-family: sans-serif; text-align: center;
    }

    #start-btn {
      padding: 18px 40px; font-size: 18px; background: #28a745; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #start-btn:disabled { background: #555; cursor: default; }

    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 25px; opacity: 0.8; }

    #progress-container {
      width: 240px; height: 4px; background: #222;
      margin-top: 20px; border-radius: 2px; display: none; overflow: hidden;
    }
    #progress-bar { width: 0%; height: 100%; background: #28a745; transition: width 0.3s ease; }

    #progress-text {
      font-size: 10px; margin-top: 15px; color: #666;
      display: none; letter-spacing: 2px; text-transform: uppercase;
    }

    #error-msg {
      display: none; margin-top: 20px; padding: 12px 20px;
      background: #8b0000; border-radius: 4px; font-size: 13px;
      max-width: 280px; line-height: 1.5;
    }

    #retry-btn {
      display: none; margin-top: 14px; padding: 12px 28px;
      font-size: 13px; background: #333; color: #fff;
      border: 1px solid #555; border-radius: 4px; cursor: pointer;
      font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
    }

    /* ── BATTERY WARNING ── */
    #battery-warn {
      display: none; position: fixed; top: 16px; right: 16px;
      background: rgba(0,0,0,0.75); color: #ffcc00;
      font-family: sans-serif; font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; padding: 6px 10px;
      border: 1px solid #ffcc00; border-radius: 3px;
      z-index: 2000; pointer-events: none;
    }

    /* ── SCAN RETICLE ── */
    #scan-reticle {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      z-index: 1000; display: none; pointer-events: none;
    }
    #scan-reticle .corner {
      position: absolute; width: 28px; height: 28px;
      border-color: #fff; border-style: solid;
      transition: top 0.35s ease, left 0.35s ease,
                  right 0.35s ease, bottom 0.35s ease,
                  opacity 0.35s ease;
    }
    /* Scanning state — corners at the edges */
    #scan-reticle .tl { top: 0;    left: 0;   border-width: 3px 0 0 3px; }
    #scan-reticle .tr { top: 0;    right: 0;  border-width: 3px 3px 0 0; }
    #scan-reticle .bl { bottom: 0; left: 0;   border-width: 0 0 3px 3px; }
    #scan-reticle .br { bottom: 0; right: 0;  border-width: 0 3px 3px 0; }

    /* Lock state — corners snap inward and fade out */
    #scan-reticle.locked .tl { top: 36px;    left: 36px;   opacity: 0; }
    #scan-reticle.locked .tr { top: 36px;    right: 36px;  opacity: 0; }
    #scan-reticle.locked .bl { bottom: 36px; left: 36px;   opacity: 0; }
    #scan-reticle.locked .br { bottom: 36px; right: 36px;  opacity: 0; }

    @keyframes reticle-pulse {
      0%, 100% { opacity: 1;    transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 0.35; transform: translate(-50%, -50%) scale(0.93); }
    }
    #scan-reticle.scanning { animation: reticle-pulse 1.8s ease-in-out infinite; }
    #scan-reticle.locked   { animation: none; }

    /* ── SCAN HINT ── */
    #scan-hint {
      position: fixed; bottom: 120px; width: 100%; text-align: center;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      font-family: sans-serif; font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 1000; display: none; font-weight: bold; pointer-events: none;
    }

    /* ── UI BUTTONS ── */
    #ui-controls {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: none; gap: 15px; z-index: 1000; width: 90%; justify-content: center;
    }

    .black-btn {
      padding: 15px 25px; background: #000; color: #fff; text-decoration: none;
      border: 1px solid #444; border-radius: 4px; font-family: sans-serif;
      font-weight: bold; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; text-align: center; min-width: 120px;
    }

    .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }
  </style>
</head>
<body class="loading-bg">

  <div id="battery-warn">&#9889; Low battery — audio paused</div>

  <!-- Animated corner-bracket reticle shown while scanning -->
  <div id="scan-reticle" class="scanning">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="scan-hint">Point camera at artwork</div>

  <div id="overlay">
    <h1 style="letter-spacing: 5px; font-weight: 300; margin-bottom: 5px;">EBONY</h1>
    <p style="font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; margin-bottom: 30px; opacity: 0.6;">By Qrcky</p>

    <div id="status-container">
      <img src="https://qrckys.github.io/mural/ebony.jpg" id="marker-preview" alt="Target">
      <br>
      <button id="start-btn">Enter Experience</button>

      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <p id="progress-text">Initializing...</p>
      <div id="error-msg"></div>
      <button id="retry-btn">Try Again</button>
    </div>
  </div>

  <div id="ui-controls">
    <a href="https://www.instagram.com/qrcky/" target="_blank" class="black-btn" data-track="instagram">Instagram</a>
    <a href="https://www.qrcky.net/prints/" target="_blank" class="black-btn" data-track="prints">Get Prints</a>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: https://qrckys.github.io/mural/targets.mind; autoStart: false; uiScanning: false; uiLoading: false; maxTrack: 1; filterMinCF: 0.001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="30000">
      <a-asset-item id="sculpture" src="https://qrckys.github.io/mural/ebony.glb" crossorigin="anonymous"></a-asset-item>
      <audio id="audio-file" src="https://qrckys.github.io/mural/ebony.mp3" preload="auto" crossorigin="anonymous" loop></audio>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-light type="ambient" intensity="1.2"></a-light>

    <a-entity mindar-image-target="targetIndex: 0" id="mural-target">
      <!-- Wrapped in a fade entity so we can animate opacity independently -->
      <a-entity id="model-wrapper" visible="false">
        <a-gltf-model id="sculpture-model" src="#sculpture" position="0.0 -0.425 0.0" scale="0.048 0.048 0.048" animation-mixer></a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    // ── ANALYTICS BEACON ────────────────────────────────────────────────────
    // Lightweight zero-dependency event tracker using navigator.sendBeacon.
    // Replace ANALYTICS_ENDPOINT with your own collector URL (e.g. a
    // Cloudflare Worker, Plausible custom events, or a simple logging endpoint).
    // Events fire-and-forget — they won't block or error the AR experience.
    const ANALYTICS_ENDPOINT = 'https://qrckys.github.io/mural/beacon'; // ← replace
    const SESSION_ID = Math.random().toString(36).slice(2, 10);

    function beacon(event, data = {}) {
      if (!navigator.sendBeacon) return;
      try {
        const payload = JSON.stringify({
          event,
          session: SESSION_ID,
          ts: Date.now(),
          ua: navigator.userAgent.slice(0, 80),
          ...data
        });
        navigator.sendBeacon(ANALYTICS_ENDPOINT, payload);
      } catch (e) {}
    }

    // ── DOM REFS ────────────────────────────────────────────────────────────
    const startBtn          = document.getElementById('start-btn');
    const retryBtn          = document.getElementById('retry-btn');
    const overlay           = document.getElementById('overlay');
    const progressContainer = document.getElementById('progress-container');
    const progressBar       = document.getElementById('progress-bar');
    const progressText      = document.getElementById('progress-text');
    const errorMsg          = document.getElementById('error-msg');
    const batteryWarn       = document.getElementById('battery-warn');
    const sceneEl           = document.querySelector('a-scene');
    const audioEl           = document.getElementById('audio-file');
    const scanHint          = document.getElementById('scan-hint');
    const scanReticle       = document.getElementById('scan-reticle');
    const uiControls        = document.getElementById('ui-controls');
    const muralTarget       = document.getElementById('mural-target');
    const modelWrapper      = document.getElementById('model-wrapper');

    let targetActive       = false;
    let userNavigatedAway  = false;
    let lowBattery         = false;
    let targetFoundTime    = null; // for dwell-time analytics

    // ── SERVICE WORKER (offline cache) ─────────────────────────────────────
    // The SW file (ebony-sw.js) must be served from the same origin.
    // It caches the GLB, MP3, and .mind file after the first visit so the
    // experience loads instantly with no internet connection.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./ebony-sw.js').catch(() => {});
    }

    // ── BATTERY DETECTION ──────────────────────────────────────────────────
    // If the device is below 15% battery, suppress audio autoplay and show
    // a small warning. The experience still works — audio just won't start.
    async function checkBattery() {
      try {
        const batt = await navigator.getBattery();
        function evaluate() {
          lowBattery = !batt.charging && batt.level < 0.15;
          batteryWarn.style.display = lowBattery ? 'block' : 'none';
          if (lowBattery) setAudioPlaying(false);
        }
        evaluate();
        batt.addEventListener('levelchange',  evaluate);
        batt.addEventListener('chargingchange', evaluate);
      } catch (e) {}
    }
    checkBattery();

    // ── AUDIO: single source of truth ──────────────────────────────────────
    let audioCtx  = null;
    let gainNode  = null;
    let fadeRaf   = null;
    const FADE_MS = 600;

    function ensureAudioGraph() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;
        gainNode.connect(audioCtx.destination);
        audioCtx.createMediaElementSource(audioEl).connect(gainNode);
      } catch (e) { audioCtx = null; }
    }

    function fadeTo(targetVol) {
      cancelAnimationFrame(fadeRaf);
      if (!gainNode) {
        if (targetVol > 0) audioEl.play().catch(() => {});
        else audioEl.pause();
        return;
      }
      const start    = performance.now();
      const startVol = gainNode.gain.value;
      const delta    = targetVol - startVol;

      function step(now) {
        const t    = Math.min(1, (now - start) / FADE_MS);
        const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
        gainNode.gain.value = startVol + delta * ease;
        if (t < 1) { fadeRaf = requestAnimationFrame(step); }
        else if (targetVol === 0) { audioEl.pause(); }
      }

      if (targetVol > 0 && audioEl.paused) audioEl.play().catch(() => {});
      fadeRaf = requestAnimationFrame(step);
    }

    function setAudioPlaying(shouldPlay) {
      if (shouldPlay && lowBattery) return; // respect battery warning
      ensureAudioGraph();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      fadeTo(shouldPlay ? 1 : 0);
    }

    function unlockAudio() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) { const t = new Ctx(); t.resume().then(() => t.close()); }
        const three = THREE.AudioContext && THREE.AudioContext.getContext();
        if (three && three.state === 'suspended') three.resume();
      } catch (e) {}
    }

    // ── MODEL FADE-IN ───────────────────────────────────────────────────────
    // A-Frame doesn't expose CSS opacity on entities, so we animate the
    // material opacity of every mesh inside the GLB via Three.js directly.

    function setModelOpacity(opacity) {
      const el = document.getElementById('sculpture-model');
      if (!el || !el.object3D) return;
      el.object3D.traverse(node => {
        if (node.isMesh && node.material) {
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach(m => {
            m.transparent = true;
            m.opacity = opacity;
          });
        }
      });
    }

    function fadeModelIn(durationMs = 400) {
      modelWrapper.setAttribute('visible', true);
      const start = performance.now();
      function step(now) {
        const t = Math.min(1, (now - start) / durationMs);
        const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
        setModelOpacity(ease);
        if (t < 1) requestAnimationFrame(step);
      }
      setModelOpacity(0);
      requestAnimationFrame(step);
    }

    function fadeModelOut(durationMs = 250) {
      const start = performance.now();
      function step(now) {
        const t = Math.min(1, (now - start) / durationMs);
        setModelOpacity(1 - t);
        if (t < 1) { requestAnimationFrame(step); }
        else { modelWrapper.setAttribute('visible', false); }
      }
      requestAnimationFrame(step);
    }

    // ── RETICLE LOCK ANIMATION ──────────────────────────────────────────────
    // reticleLock() accepts an onComplete callback so the reticle hides at
    // EXACTLY the same moment fadeModelIn begins — no loose timer, no gap.

    function reticleLock(onComplete) {
      scanReticle.classList.remove('scanning');
      scanReticle.classList.add('locked');
      setTimeout(() => {
        scanReticle.style.display = 'none';
        if (onComplete) onComplete();
      }, 360);
    }

    function reticleReset() {
      // Full reset + reflow so the pulse animation always restarts from
      // frame 0 — prevents the locked state bleeding into the next scan.
      scanReticle.style.display = 'none';
      scanReticle.classList.remove('locked', 'scanning');
      void scanReticle.offsetWidth; // force reflow
      scanReticle.classList.add('scanning');
      scanReticle.style.display = 'block';
    }

    // ── SIMULATED PROGRESS ──────────────────────────────────────────────────
    let simProgress = 0;
    let simInterval = null;
    let loadTimeout = null;

    function startSimProgress() {
      simInterval = setInterval(() => {
        simProgress += (99 - simProgress) * 0.04;
        renderProgress(simProgress);
      }, 120);

      loadTimeout = setTimeout(() => {
        clearInterval(simInterval);
        showError('Taking too long to load.<br>Check your connection or camera permissions.', true);
      }, 30000);
    }

    function completeProgress() {
      clearInterval(simInterval);
      clearTimeout(loadTimeout);
      renderProgress(100);
    }

    function renderProgress(val) {
      const v = Math.min(100, val);
      progressBar.style.width = v + '%';
      let status = 'DOWNLOADING ASSETS...';
      if (v > 60) status = 'LOADING MODEL...';
      if (v > 85) status = 'STARTING CAMERA...';
      if (v >= 100) status = 'READY';
      progressText.innerText = `${status}  ${Math.round(v)}%`;
    }

    // ── START ───────────────────────────────────────────────────────────────
    startBtn.addEventListener('click', () => {
      unlockAudio();
      beacon('session_start');
      startBtn.style.display          = 'none';
      progressContainer.style.display = 'block';
      progressText.style.display      = 'block';
      startSimProgress();

      function startAR() {
        const mindAR = sceneEl.systems['mindar-image-system'];
        if (mindAR) mindAR.start();
        else showError('AR system failed to initialise. Please refresh.');
      }

      if (sceneEl.hasLoaded) startAR();
      else sceneEl.addEventListener('loaded', startAR, { once: true });
    });

    retryBtn.addEventListener('click', () => {
      beacon('retry');
      window.location.reload();
    });

    // ── CAMERA READY ────────────────────────────────────────────────────────
    sceneEl.addEventListener('arReady', () => {
      beacon('ar_ready');
      completeProgress();
      setTimeout(() => {
        document.body.classList.remove('loading-bg');
        document.body.classList.add('ar-active');
        overlay.style.display = 'none';
        scanHint.style.display = 'block';
        reticleReset();
      }, 800);
    });

    // ── TARGET FOUND / LOST ─────────────────────────────────────────────────
    let lostTimer = null;

    muralTarget.addEventListener('targetFound', () => {
      clearTimeout(lostTimer);
      lostTimer        = null;
      targetActive     = true;
      targetFoundTime  = Date.now();

      scanHint.style.display   = 'none';
      uiControls.style.display = 'flex';

      if (navigator.vibrate) navigator.vibrate(80);

      setAudioPlaying(true);
      beacon('target_found');

      // Reticle lock plays first; fadeModelIn fires in its callback so the
      // model only appears the instant the reticle finishes hiding.
      reticleLock(() => fadeModelIn(400));
    });

    muralTarget.addEventListener('targetLost', () => {
      lostTimer = setTimeout(() => {
        const dwell = targetFoundTime ? Math.round((Date.now() - targetFoundTime) / 1000) : 0;
        beacon('target_lost', { dwell_seconds: dwell });
        targetActive    = false;
        targetFoundTime = null;

        reticleReset();
        scanHint.style.display   = 'block';
        uiControls.style.display = 'none';

        fadeModelOut(250);
        setAudioPlaying(false);
      }, 1500);
    });

    // ── BUTTON NAVIGATION ───────────────────────────────────────────────────
    document.querySelectorAll('.black-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        beacon('button_click', { label: btn.dataset.track || btn.textContent.trim() });
        userNavigatedAway = true;
        setAudioPlaying(false);
      });
    });

    // ── VISIBILITY ──────────────────────────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        setAudioPlaying(false);
      } else {
        if (userNavigatedAway) { userNavigatedAway = false; return; }
        if (targetActive) setAudioPlaying(true);
      }
    });

    // ── ERROR HANDLING ──────────────────────────────────────────────────────
    sceneEl.addEventListener('arError', (e) => {
      const detail = (e.detail || '').toString().toLowerCase();
      let msg;
      if (location.protocol !== 'https:') {
        msg = 'HTTPS is required for camera access.<br>Please open this page over a secure connection.';
      } else if (detail.includes('permission') || detail.includes('denied')) {
        msg = 'Camera permission was denied.<br>Allow camera access in your browser settings, then refresh.';
      } else if (detail.includes('support') || detail.includes('webkit')) {
        msg = 'Your browser may not support WebAR.<br>Try opening in Chrome or Safari.';
      } else {
        msg = 'Could not start the camera.<br>Please refresh and allow camera access.';
      }
      beacon('ar_error', { detail: detail.slice(0, 80) });
      showError(msg, true);
    });

    function showError(html, showRetry = false) {
      clearInterval(simInterval);
      clearTimeout(loadTimeout);
      startBtn.style.display          = 'none';
      progressContainer.style.display = 'none';
      progressText.style.display      = 'none';
      errorMsg.innerHTML              = html;
      errorMsg.style.display          = 'block';
      retryBtn.style.display          = showRetry ? 'inline-block' : 'none';
    }
  </script>
</body>
</html>
