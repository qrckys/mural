<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AR DEBUG | EBONY</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #debug-log {
      position: fixed; top: 10px; left: 10px; padding: 10px;
      background: rgba(0,0,0,0.8); color: #00ff00; font-family: monospace;
      font-size: 12px; z-index: 9999; pointer-events: none; width: 90%;
    }
    #start-btn { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 20px; z-index: 10000; cursor: pointer;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="debug-log">Status: Waiting for Start...</div>
  <button id="start-btn">TAP TO START DEBUG</button>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no; uiLoading: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, alpha: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="ebony-model" src="ebony.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-box position="0 0 0.1" scale="0.2 0.2 0.2" color="red"></a-box>

      <a-gltf-model 
        src="#ebony-model" 
        position="0 0 0.2" 
        scale="0.01 0.01 0.01" 
        rotation="90 0 0">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const log = document.getElementById('debug-log');
    const startBtn = document.getElementById('start-btn');
    const sceneEl = document.querySelector('a-scene');

    function updateLog(msg) {
      log.innerHTML += `<br>> ${msg}`;
    }

    startBtn.addEventListener('click', () => {
      startBtn.classList.add('hidden');
      updateLog("Starting AR Engine...");
      sceneEl.systems["mindar-image-system"].start();
    });

    sceneEl.addEventListener("arReady", () => updateLog("AR Engine Ready. Aim at mural."));
    sceneEl.addEventListener("arError", (e) => updateLog("ERROR: " + e.detail.error));
    
    sceneEl.addEventListener("targetFound", () => {
      updateLog("MURAL DETECTED!");
      document.body.style.backgroundColor = "transparent";
    });

    sceneEl.addEventListener("targetLost", () => updateLog("Target Lost."));

    // Check if the GLB file actually loads
    document.querySelector('#ebony-model').addEventListener('model-loaded', () => {
      updateLog("SUCCESS: ebony.glb loaded.");
    });
    document.querySelector('#ebony-model').addEventListener('model-error', (e) => {
      updateLog("ERROR: ebony.glb failed to load.");
    });
  </script>
</body>
</html>
