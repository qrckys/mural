<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EBONY | Camera Force-Start</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; }
        
        /* High-visibility Debugger */
        #status-log {
            position: fixed; top: 0; left: 0; width: 100%; height: 30%;
            background: rgba(0,255,0,0.1); color: #0f0; padding: 15px;
            font-size: 14px; z-index: 10000; overflow-y: scroll; pointer-events: none;
            border-bottom: 1px solid #0f0;
        }

        /* The Button - Absolute Top Layer */
        #force-start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; padding: 40px; background: #fff; color: #000;
            border: none; border-radius: 15px; font-size: 20px; font-weight: 900;
            z-index: 20000; cursor: pointer; box-shadow: 0 0 50px rgba(0,255,0,0.5);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="status-log">LOG INITIATED...<br>> Site Ready.</div>
    <button id="force-start-btn">TAP TO ACTIVATE CAMERA</button>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: no;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, alpha: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="ebony-model" src="ebony.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-box position="0 0 0.1" scale="0.2 0.2 0.2" color="red"></a-box>
            
            <a-gltf-model 
                src="#ebony-model" 
                position="0 0 0.2" 
                scale="0.01 0.01 0.01" 
                rotation="90 0 0">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const log = document.getElementById('status-log');
        const btn = document.getElementById('force-start-btn');
        const sceneEl = document.querySelector('a-scene');

        function print(msg) {
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        // Check for Secure Context
        if (!window.isSecureContext) {
            print("CRITICAL: Browser says this site is NOT SECURE. Camera blocked.");
        }

        btn.addEventListener('click', async () => {
            print("Button Click Detected...");
            btn.classList.add('hidden');

            // Step 1: Force Camera Permission via Browser API
            try {
                print("Requesting Media Devices...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                print("Camera Access Granted by User.");
                stream.getTracks().forEach(track => track.stop()); // Close it so AR can take over
            } catch (err) {
                print("PERMISSION DENIED: " + err.name);
                return;
            }

            // Step 2: Start MindAR Engine
            try {
                print("Igniting AR Engine...");
                await sceneEl.systems["mindar-image-system"].start();
                print("AR SYSTEM ACTIVE. Point at Ebony Mural.");
                document.body.style.backgroundColor = "transparent";
            } catch (e) {
                print("AR ENGINE CRASH: " + e.message);
            }
        });

        // Tracking Listeners
        sceneEl.addEventListener("targetFound", () => print("MURAL IDENTIFIED! Rendering 3D..."));
        sceneEl.addEventListener("targetLost", () => print("Tracking Lost. Center the mural."));
    </script>
</body>
</html>
